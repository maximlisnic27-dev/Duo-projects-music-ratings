<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PublicOpinion </title>
  <link rel="stylesheet" href="style.css"/>    
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav>
    <a href="#" class="logo">Public<span class="dot">Opinion.</span></a>
 
    <ul class="nav-links" id="navLinks">
      <li><a href="#">Home</a></li>
      <li><a href="#">New</a></li>
      <li><a href="#">Radio</a></li>
      <li><a href="#">Browse by Genre</a></li>
    </ul>
 
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
    <section class="hero">
  <div class="hero-text">
    <h1>Rate Any Song!</h1>
    <p>Check the rating of any song online and<br>see what listeners around the world think<br>about it.</p>
    <a href="#" class="btn-get-started">Get Started</a>
  </div>
  <div class="hero-image">
    <img src="../img/girl.jpg" alt="girl">
  </div>
</section>
<section class="checker-section" id="checker">
  <div class="checker-box">
    <h2 class="checker-title">Checker</h2>
    <div class="checker-search-row">
      <input type="text" class="checker-input" id="musicInput" placeholder="Enter here your music name..."/>
      <button class="checker-btn" id="searchBtn">Search</button>
    </div>
    <div class="checker-results" id="checkerResults">
      <p class="checker-placeholder">Nothing...</p>
    </div>
  </div>
</section>

  <script src="script.js"></script>
</body>
</html>
